name: Crosspost to Social Media

on:
  push:
    branches: [ main ]
    paths:
      - '_posts/**'
  workflow_dispatch:
    inputs:
      post_url:
        description: 'URL of the post'
        required: true
      post_title:
        description: 'Title of the post'
        required: true
      post_description:
        description: 'Description/Caption'
        required: true
      post_image:
        description: 'Image URL'
        required: true

jobs:
  crosspost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # This step helps debug if files are actually there
      - name: Check files
        run: ls -R

      - name: Install dependencies
        run: npm install

      - name: Parse post metadata (Push only)
        id: parse
        if: github.event_name == 'push' && steps.changed-files.outputs.any_changed == 'true'
        run: |
          POST_FILE=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | head -n1)
          node scripts/parse-frontmatter.js "$POST_FILE" > post-data.json
          echo "POST_URL=$(jq -r .url post-data.json)" >> $GITHUB_ENV
          echo "POST_TITLE=$(jq -r .title post-data.json)" >> $GITHUB_ENV
          echo "POST_DESCRIPTION=$(jq -r .description post-data.json)" >> $GITHUB_ENV
          echo "POST_IMAGE=$(jq -r .image post-data.json)" >> $GITHUB_ENV

      - name: Crosspost
        env:
          POST_URL: ${{ github.event.inputs.post_url || env.POST_URL }}
          POST_TITLE: ${{ github.event.inputs.post_title || env.POST_TITLE }}
          POST_DESCRIPTION: ${{ github.event.inputs.post_description || env.POST_DESCRIPTION }}
          POST_IMAGE: ${{ github.event.inputs.post_image || env.POST_IMAGE }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        # Only run if we have a URL from either push or manual trigger
        if: always() && (github.event.inputs.post_url != '' || env.POST_URL != '')
        run: node scripts/elite-crosspost.js
