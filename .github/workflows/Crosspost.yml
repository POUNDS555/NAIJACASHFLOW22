name: Crosspost to Social Media

on:
  push:
    branches: [ main ]
    paths:
      - '_posts/**'
  workflow_dispatch:
    inputs:
      post_url:
        description: 'URL of the post'
        required: true
      post_title:
        description: 'Title of the post'
        required: true
      post_description:
        description: 'Description/Caption'
        required: false
      post_image:
        description: 'Image URL'
        required: false

jobs:
  crosspost:
    runs-on: ubuntu-latest
    env:
      # This removes the Node 24 warning for now
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Use v4 or v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Crosspost execution
        env:
          POST_URL: ${{ github.event.inputs.post_url }}
          POST_TITLE: ${{ github.event.inputs.post_title }}
          POST_DESCRIPTION: ${{ github.event.inputs.post_description }}
          POST_IMAGE: ${{ github.event.inputs.post_image }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: node scripts/elite-crosspost.js
